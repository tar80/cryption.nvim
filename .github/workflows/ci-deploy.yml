name: CI and Deploy

on:
  push:
    branches:
      - work
  workflow_dispatch:

concurrency:
  group: ci-exclusive-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      needs_test: ${{ steps.filter.outputs.logic }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            logic:
              - 'lua/**'
              - 'tests/**'
              - 'doc/**'

  test:
    needs: changes
    if: needs.changes.outputs.needs_test == 'true'
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: "stable"

      - name: Setup StyLua
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --version

      - name: Install Plenary
        run: |
          git clone --depth 1 https://github.com/nvim-lua/plenary.nvim /tmp/plenary.nvim

      - name: Install age components from official release
        run: |
          LATEST_AGE=$(curl -s https://api.github.com/repos/filosottile/age/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          curl -sL "https://github.com/filosottile/age/releases/download/${LATEST_AGE}/age-${LATEST_AGE}-linux-amd64.tar.gz" | tar xz --strip-components=1

      - name: Install Latest sops
        run: |
          LATEST_SOPS=$(curl -s https://api.github.com/repos/getsops/sops/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')

          curl -LO "https://github.com/getsops/sops/releases/download/${LATEST_SOPS}/sops-${LATEST_SOPS}.linux.amd64"

          mv sops-${LATEST_SOPS}.linux.amd64 sops

      - name: Add Workspace to Path
        run: |
          chmod +x age age-keygen age-inspect sops
          echo "$GITHUB_WORKSPACE" >> $GITHUB_PATH

      - name: Run Tests
        env:
          STYLUA_PATH: stylua
          PLENARY_PATH: /tmp/plenary.nvim
        run: make all

  check_doc:
    needs: changes
    if: needs.changes.outputs.needs_test == 'true'
    name: Check vimdoc is up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install lemmy-help
        run: |
          curl -sL https://github.com/numToStr/lemmy-help/releases/latest/download/lemmy-help-x86_64-unknown-linux-gnu.tar.gz | tar xz
          chmod +x lemmy-help
      - name: Check vimdoc
        run: |
          LEMMY_HELP=./lemmy-help make doc
          git diff --exit-code doc/

  deploy:
    if: |
      always() &&
      github.repository_owner == 'tar80' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.check_doc.result == 'success' || needs.check_doc.result == 'skipped')
    needs: [changes, test, check_doc]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Automated Merge
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          if ! git merge origin/work --ff-only; then
            echo "Error: Fast-forward merge is not possible."
            exit 1
          fi
          git push origin main
          git push origin --delete work
